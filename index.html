<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>VeXorium</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #1a0033);
      color: white;
      text-align: center;
    }

    header {
      padding: 60px 20px;
    }

    h1 {
      font-size: 50px;
      color: #a855f7;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #cccccc;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      background: #a855f7;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:hover {
      background: #7c3aed;
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      font-size: 14px;
      color: #888;
    }
  </style>

</head>

<body>

  <header>
    <h1>VeXorium</h1>
    <p>Build the future 🚀</p>

    <button class="btn" onclick="alert('Bienvenue sur VeXorium 🚀')">
      Entrer
    </button>
  </header>

  <footer>
    © 2026 VeXorium - Tous droits réservés
  </footer>

</body>
</html>
