<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeXorium</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #050505;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
    font-size: 24px;
    font-weight: bold;
}

.logo span {
    color: #8a2be2;
}

.menu {
    display: flex;
    gap: 30px;
}

.menu a {
    color: white;
    text-decoration: none;
    opacity: 0.7;
    transition: 0.3s;
}

.menu a:hover {
    opacity: 1;
    color: #a855f7;
}

/* Search icon (sans carré rouge) */
.search {
    font-size: 18px;
    cursor: pointer;
    opacity: 0.7;
}

.search:hover {
    opacity: 1;
}

/* HERO */
.hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 80px 50px;
}

.hero-text {
    max-width: 600px;
}

.hero h1 {
    font-size: 60px;
    margin-bottom: 20px;
}

.hero h1 span {
    color: #8a2be2;
}

.hero p {
    color: #ccc;
    margin-bottom: 40px;
    line-height: 1.6;
}

/* BUTTONS */
.buttons {
    display: flex;
    gap: 20px;
}

.btn-primary {
    background: linear-gradient(90deg, #7c3aed, #9333ea);
    padding: 15px 25px;
    border-radius: 10px;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.btn-primary:hover {
    opacity: 0.8;
}

.btn-outline {
    border: 1px solid #9333ea;
    padding: 15px 25px;
    border-radius: 10px;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.btn-outline:hover {
    background: #9333ea;
}

/* IMAGE */
.hero-img {
    font-size: 200px;
    font-weight: bold;
    background: linear-gradient(135deg, #aaa, #8a2be2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
</style>

</head>

<body>

<nav>
    <div class="logo">Ve<span>Xorium</span></div>

    <div class="menu">
        <a href="#">Accueil</a>
        <a href="#">À propos</a>
        <a href="#">Services</a>
        <a href="#">Projets</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>
    </div>

    <div class="search">🔍</div>
</nav>

<section class="hero">
    <div class="hero-text">
        <h1>Bienvenue sur <br>Ve<span>Xorium</span></h1>

        <p>
            Nous vous aidons à amélioré votre Business. Découvrez VeXorium c'est un site 
            qui permet à vous de trouver des produits en ventes ou de vendre vos produits.
        </p>

        <div class="buttons">
            <a href="#" class="btn-primary">Découvrez notre Site →</a>
            <a href="#" class="btn-outline">Boutique</a>
        </div>
    </div>

    <div class="hero-img">VX</div>
</section>

</body>
</html>
